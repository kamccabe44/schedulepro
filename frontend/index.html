<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Chair — Book a Haircut</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-icon">✂</span>
      <div>
        <div class="brand-name">The Chair</div>
        <div class="brand-tagline">Fresh cuts, no waiting</div>
      </div>
    </div>
    <div id="authArea">
      <button id="loginBtn" class="btn-primary">Sign In / Create Account</button>
      <div id="userMenu" class="hidden">
        <span id="userName"></span>
        <button id="logoutBtn" class="btn-ghost">Sign Out</button>
      </div>
    </div>
  </header>

  <!-- Shown when logged out -->
  <section id="hero" class="hidden">
    <div class="hero-content">
      <h1>Book your next haircut online</h1>
      <p>Create a free account to browse available times and book with one click.</p>
      <button id="heroLoginBtn" class="btn-primary btn-lg">Get Started</button>
    </div>
  </section>

  <!-- Shown when logged in -->
  <main id="app" class="hidden">
    <div class="container">

      <!-- Booking panel -->
      <section class="card" id="bookingPanel">
        <h2>Book an Appointment</h2>

        <div class="form-row">
          <div class="form-group">
            <label for="datePicker">Select a date</label>
            <input type="date" id="datePicker" />
          </div>
          <div class="form-group">
            <label for="servicePicker">Service</label>
            <select id="servicePicker">
              <option value="">— choose a service —</option>
            </select>
          </div>
        </div>

        <div id="slotsSection" class="hidden">
          <label>Available times</label>
          <div id="slotsGrid" class="slots-grid"></div>
        </div>

        <div id="bookingConfirm" class="hidden">
          <div class="confirm-summary" id="confirmSummary"></div>
          <div class="form-group">
            <label for="bookingNotes">Notes for the barber (optional)</label>
            <input type="text" id="bookingNotes" placeholder="e.g. fade on the sides" />
          </div>
          <button id="confirmBookBtn" class="btn-primary">Confirm Booking</button>
        </div>
      </section>

      <!-- My appointments -->
      <section class="card" id="appointmentsPanel">
        <h2>My Upcoming Appointments</h2>
        <div id="appointmentsList"><p class="muted">Loading...</p></div>
      </section>

    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
